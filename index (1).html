const BEST_KEY='yanenekoV6best';

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
const P=n=>Math.round(n);

// ═══════════════════════════════════════
//  SOUND
// ═══════════════════════════════════════
const Sound=(()=>{
  let ac=null;
  const init=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();};
  const tone=(freqs,durs,type='square',vol=0.10)=>{
    if(!ac)return;
    const now=ac.currentTime;
    const g=ac.createGain();
    const total=durs.reduce((a,b)=>a+b,0);
    g.gain.setValueAtTime(vol,now);
    g.gain.exponentialRampToValueAtTime(0.0001,now+total);
    g.connect(ac.destination);
    let t=now;
    freqs.forEach((f,i)=>{
      const o=ac.createOscillator();
      o.type=type;o.frequency.setValueAtTime(f,t);
      o.connect(g);o.start(t);o.stop(t+durs[i]);t+=durs[i];
    });
  };
  return{
    init,
    jump: ()=>tone([440,880],[0.05,0.10]),
    land: ()=>tone([260,160],[0.05,0.05]),
    flip: ()=>tone([660,1320,660],[0.05,0.06,0.05]),
    fish: ()=>tone([880,1100,1320],[0.04,0.04,0.08],'sine',0.15),
  };
})();

// ═══════════════════════════════════════
//  PIXEL HELPERS
// ═══════════════════════════════════════
const pr=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(P(x),P(y),P(w)||1,P(h)||1);};
let _fontOk=false;
document.fonts.load('10px "Press Start 2P"').then(()=>_fontOk=true);
const txt=(s,x,y,sz,col,align='left')=>{
  ctx.save();
  ctx.font=`${sz}px "${_fontOk?'Press Start 2P':'monospace'}"`;
  ctx.textAlign=align;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillText(s,P(x)+2,P(y)+2);
  ctx.fillStyle=col;ctx.fillText(s,P(x),P(y));
  ctx.restore();
};

const ROOF_PALS=[
  {wall:'#3a2010',roof:'#5c3018',trim:'#8b5a2e',acc:'#c08040'},
  {wall:'#102030',roof:'#1e3a5a',trim:'#2a5080',acc:'#4080b0'},

  {wall:'#201010',roof:'#4a1810',trim:'#6a2818',acc:'#a03820'},

// ═══════════════════════════════════════
//  BACKGROUND
// ═══════════════════════════════════════
const BG=(()=>{
  const stars=Array.from({length:95},()=>({
    x:P(Math.random()*W),y:P(Math.random()*(H*0.65)),
    sz:Math.random()<0.25?2:1,
    period:40+Math.random()*110,phase:Math.random()*Math.PI*2,
    hi:0.4+Math.random()*0.6,lo:Math.random()*0.08,
  }));
  const bgc=document.createElement('canvas');
  bgc.width=W*2;bgc.height=160;
  const bgx=bgc.getContext('2d');
  for(let i=0;i<28;i++){
    const bw=28+Math.floor(Math.random()*52),bh=35+Math.floor(Math.random()*80);
    const bx=i*55+Math.floor(Math.random()*15);
    bgx.fillStyle='#0c0820';bgx.fillRect(bx,160-bh,bw,bh);
    bgx.fillStyle='rgba(255,220,80,0.09)';
    for(let wy=6;wy<bh-8;wy+=12)for(let wx=5;wx<bw-6;wx+=9)bgx.fillRect(bx+wx,160-bh+wy,3,5);
  }
  let ss=null,ssNext=220;
  return{
    draw(frame){
      // sky bands
      pr(0,0,W,H*0.32,'#020211');
      pr(0,H*0.32,W,H*0.26,'#0e0c30');
      pr(0,H*0.58,W,H*0.42,'#1c1040');
      // stars
      for(const s of stars){
        const a=s.lo+(s.hi-s.lo)*(0.5+0.5*Math.sin(frame/s.period*Math.PI*2+s.phase));
        if(a<0.05)continue;
        ctx.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`;
        ctx.fillRect(s.x,s.y,s.sz,s.sz);
      }
      // moon: slow large arc, left to right
      // period: 8000 frames (~2min @60fps) for full arc traverse
      const moonT=(frame%8000)/8000; // 0..1
      const mx=P(-60+moonT*(W+120)); // left to right
      const my=P(180-Math.sin(moonT*Math.PI)*150); // arc: peak at top middle
      ctx.fillStyle='#eeeedd';ctx.beginPath();ctx.arc(mx,my,18,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#0e0c30';ctx.beginPath();ctx.arc(mx+10,my-5,16,0,Math.PI*2);ctx.fill();
      // shooting star
      ssNext--;
      if(!ss&&ssNext<=0){
        const spd=8+Math.random()*6,len=45+Math.random()*50,life=28+Math.floor(Math.random()*20);
        ss={x:Math.random()*W*0.7,y:Math.random()*H*0.28,vx:spd*0.85,vy:spd*0.52,len,life,maxLife:life};
        ssNext=200+Math.floor(Math.random()*420);
      }
      if(ss){
        const spd=Math.hypot(ss.vx,ss.vy),a=(ss.life/ss.maxLife)*0.9;
        const steps=Math.floor(ss.len/5);
        for(let i=0;i<steps;i++){
          const f=i/steps;
          ctx.fillStyle=`rgba(255,248,210,${(a*(1-f)).toFixed(2)})`;
          ctx.fillRect(P(ss.x-ss.vx/spd*ss.len*f),P(ss.y-ss.vy/spd*ss.len*f),i<2?2:1,i<2?2:1);
        }
        ss.x+=ss.vx;ss.y+=ss.vy;ss.life--;
        if(ss.life<=0||ss.x>W+60)ss=null;
      }
      // distant buildings parallax
      const off=P((frame*0.15)%(W*2));
      ctx.drawImage(bgc,-off,H-182);
      ctx.drawImage(bgc,W*2-off,H-182);
      // ground
      pr(0,GY,W,H-GY,'#100c08');
      pr(0,GY,W,2,'#1e1610');
      ctx.fillStyle='#181210';
      for(let x=0;x<W;x+=32)ctx.fillRect(x,GY+2,1,H-GY-2);
    }
  };
})();

// ═══════════════════════════════════════
//  ROOF
// ═══════════════════════════════════════
class Roof{
  constructor(worldX,w,bh,shape,pal,isWarmup=false){
    this.worldX=worldX;this.w=w;this.bh=bh;
    this.shape=shape;this.pal=pal;this.isWarmup=isWarmup;
    this.roofH=isWarmup?8:P(18+Math.random()*34);
    this.shedDir=Math.random()<0.5?1:-1;
    const canShape=['gable','shed','barrel'].includes(shape);
    this.collShaped=canShape&&(Math.random()<0.30);
    // windows
    this.wins=[];
    if(!isWarmup){
      const wc=Math.max(1,Math.floor(w/36)),wr=Math.max(1,Math.floor(bh/40));
      const wx=w/(wc+1),wy=bh/(wr+1);
      for(let r=1;r<=wr;r++)for(let c=1;c<=wc;c++){
        this.wins.push({
          ox:P(wx*c-5),oy:P(wy*r-6),
          lit:((Math.floor(worldX)*7+r*13+c*5)%3)!==0
        });
      }
    }
  }
  get wallTopY(){return GY-this.bh;}

  // Surface Y for collision at given WORLD x
  surfAt(worldPx,scrollX){
    const topY=this.wallTopY;
    if(!this.collShaped)return topY;
    const lx=(worldPx-this.worldX)/this.w;
    const rH=this.roofH;
    if(this.shape==='gable') return topY-rH*(1-Math.abs(lx-0.5)*2);
    if(this.shape==='shed')  return this.shedDir>0?topY-rH*(1-lx):topY-rH*lx;
    if(this.shape==='barrel'){const t=(lx-0.5)*2;return topY-rH*(1-t*t);}
    return topY;
  }

  draw(scrollX){
    const bx=P(this.worldX-scrollX);
    const topY=this.wallTopY;
    const{wall,roof,trim,acc}=this.pal;
    // wall
    pr(bx,topY,this.w,this.bh,wall);
    // windows
    for(const w of this.wins){
      pr(bx+w.ox,topY+w.oy,10,10,w.lit?'#ffe890':'#1a2030');
      if(w.lit)pr(bx+w.ox,topY+w.oy,10,2,'#ffffc0');
    }
    // trim
    pr(bx-1,topY-2,this.w+2,3,trim);
    // roof shape
    ctx.save();ctx.translate(bx,topY);
    ctx.fillStyle=roof;ctx.strokeStyle=acc;ctx.lineWidth=1.5;
    const rH=this.roofH,rw=this.w;
    const rp=new Path2D();
    rp.moveTo(0,0);
    if(this.shape==='flat'){
      rp.lineTo(rw,0);rp.lineTo(rw,-rH);rp.lineTo(0,-rH);
    }else if(this.shape==='gable'){
      rp.lineTo(rw,0);rp.lineTo(rw/2,-rH);
    }else if(this.shape==='hip'){
      rp.lineTo(rw,0);rp.lineTo(rw*0.8,-rH);rp.lineTo(rw*0.2,-rH);
    }else if(this.shape==='mansard'){
      rp.lineTo(rw,0);rp.lineTo(rw*0.85,-rH*0.55);
      rp.lineTo(rw*0.85,-rH);rp.lineTo(rw*0.15,-rH);rp.lineTo(rw*0.15,-rH*0.55);
    }else if(this.shape==='shed'){
      if(this.shedDir>0){rp.lineTo(rw,0);rp.lineTo(0,-rH);}
      else{rp.lineTo(rw,-rH);rp.lineTo(0,0);}
    }else if(this.shape==='barrel'){
      rp.lineTo(rw,0);rp.bezierCurveTo(rw*0.9,-rH*1.35,rw*0.1,-rH*1.35,0,0);
    }else if(this.shape==='sawtooth'){
      const n=Math.max(2,Math.floor(rw/48)),tw=rw/n;
      for(let i=0;i<n;i++){rp.lineTo((i+0.7)*tw,-rH);rp.lineTo((i+1)*tw,0);}
    }
    rp.closePath();
    ctx.fill(rp);ctx.stroke(rp);
    ctx.restore();
    // AC units on warmup roof
    if(this.isWarmup){
      for(let xi=bx+30;xi<bx+this.w-60;xi+=90){
        pr(xi,topY-rH-14,20,10,'#2a3a2a');pr(xi,topY-rH-15,20,3,'#3a5a3a');
      }
    }
    // shaped-collision faint marker
    if(this.collShaped&&!this.isWarmup){
      ctx.fillStyle='rgba(255,200,80,0.25)';ctx.fillRect(bx+2,topY-1,this.w-4,1);
    }
  }
}

// ═══════════════════════════════════════
//  FISH TOKEN
// ═══════════════════════════════════════
class Fish{
  constructor(worldX,worldY){
    this.wx=worldX;this.wy=worldY;
    this.bobPhase=Math.random()*Math.PI*2;
    this.collected=false;this.fadeT=0;
  }
  get alive(){return!this.collected||this.fadeT<22;}
  screenX(scrollX){return this.wx-scrollX;}
  screenY(frame){return this.wy+Math.sin(frame*0.10+this.bobPhase)*4;}
  update(frame){if(this.collected)this.fadeT++;}
  draw(scrollX,frame){
    const fx=P(this.screenX(scrollX)),fy=P(this.screenY(frame));
    if(this.collected){
      const a=Math.max(0,1-this.fadeT/18);
      if(a<0.02)return;
      ctx.globalAlpha=a;
      const fimg=IMGS.fish;
      if(fimg){
        const fsc=24/fimg.height;
        const fw=P(fimg.width*fsc),fh=P(fimg.height*fsc);
        ctx.drawImage(fimg,fx-fw/2,P(fy-this.fadeT*1.5-fh/2),fw,fh);
      }
      txt('+10',fx,P(fy-this.fadeT*1.5-20),8,'#ffff60','center');
      ctx.globalAlpha=1;
      return;
    }
    const bob=P(Math.sin(frame*0.10+this.bobPhase)*3);
    const fy2=fy+bob;
    const img=IMGS.fish;
    if(!img)return;
    const FH=32;
    const sc=FH/img.height;
    const dw=P(img.width*sc),dh=P(img.height*sc);
    const glow=Math.sin(frame*0.18+this.bobPhase)>0.7;
    if(glow){
      ctx.save();
      ctx.shadowColor='rgba(255,220,60,0.85)';
      ctx.shadowBlur=10;
      ctx.drawImage(img,fx-dw/2,P(fy2-dh/2),dw,dh);
      ctx.restore();
    } else {
      ctx.drawImage(img,fx-dw/2,P(fy2-dh/2),dw,dh);
    }
  }

}
// ═══════════════════════════════════════
//  CAT
// ═══════════════════════════════════════
class Cat{
  constructor(){
    this.y=0;this.vy=0;
    this.onGround=true;this.dead=false;
    this.runF=0;this.runT=0;
    this.squashT=0;
    this.launchT=0;  // frames of crouch-hold before liftoff
    this.airPhase=''; // track jump phase for smooth transitions
  }
  jump(){
    if(!this.onGround||this.dead)return;
    this.onGround=false;
    this.vy=0;
    this.launchT=3;
    this.squashT=0;
    this.airPhase='crouch';
    this.jumpHeld=true;
    this.framesSinceLaunch=0;
    Sound.jump();
  }
  releaseJump(){
    // If released early in ascent, halve upward velocity for a short jump
    if(this.jumpHeld&&this.framesSinceLaunch>=0&&this.framesSinceLaunch<6&&this.vy<0){
      this.vy*=0.45;
    }
    this.jumpHeld=false;
  }
  update(){
    if(!this.onGround){
      if(this.launchT>0){
        this.launchT--;
        if(this.launchT===0){
          this.vy=JUMP_F;
          this.airPhase='launch';
          this.framesSinceLaunch=0;
        }
      }else{
        if(this.framesSinceLaunch!==undefined)this.framesSinceLaunch++;
        this.vy+=GRAVITY;
        this.y+=this.vy;
        // Phase transitions based on velocity
        if(this.vy<-6)       this.airPhase='launch';
        else if(this.vy<-1)  this.airPhase='launch2';
        else if(this.vy<3)   this.airPhase='apex';
        else                 this.airPhase='descent';
      }
    }else{
      // Ground: run cycle
      this.runT++;
      if(this.runT>=8){this.runT=0;this.runF=1-this.runF;}
      if(this.squashT>0)this.squashT--;
      if(this.squashT===0)this.airPhase='';
    }
  }
  draw(totalDeaths,frame){
    const cx=CAT_SCR_X,y=P(this.y);
    const inAir=!this.onGround&&this.launchT===0;
    const angel=totalDeaths>=9;

    // ── Sprite selection ──
    let key;
    if(!this.onGround||this.launchT>0){
      // In air or crouch-hold
      if(this.launchT>0)           key='jump0'; // Crouch
      else if(this.airPhase==='launch')  key='jump1'; // Launch (ascent fast)
      else if(this.airPhase==='launch2') key='jump2'; // Launch2 (ascent slow)
      else if(this.airPhase==='apex')    key='jump2'; // reuse Launch2 at apex
      else                               key='jump3'; // Descent
    }else{
      // On ground
      if(this.squashT>6)      key='jump4'; // Contact (impact)
      else if(this.squashT>0) key='jump5'; // Recovery
      else                    key=this.runF===0?'run0':'run1'; // Run cycle
    }

    const img=IMGS[key];
    if(!img)return;

    // Scale: normalize height to RENDER_H
    const RENDER_W=64;
    const scale=RENDER_W/img.width;
    const dw=P(img.width*scale),dh=P(img.height*scale);

    ctx.save();
    // Slight velocity tilt in air
    if(inAir){
      const tilt=Math.max(-0.25,Math.min(0.25,this.vy*0.018));
      ctx.translate(cx,y+dh/2);ctx.rotate(tilt);ctx.translate(-cx,-(y+dh/2));
    }

    // Draw sprite bottom-aligned to cat foot position
    ctx.drawImage(img,P(cx-dw/2),P(y),dw,dh);

    // Angel halo
    if(angel){
      const haloY=P(y-6+Math.sin(frame*0.08)*2.5);
      ctx.save();
      ctx.shadowColor='rgba(255,240,80,0.9)';ctx.shadowBlur=8;
      ctx.strokeStyle='rgba(255,240,80,0.95)';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.ellipse(cx,haloY,14,5,0,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
    ctx.restore();

    // Wind lines while airborne
    if(inAir){
      ctx.fillStyle='rgba(160,210,255,0.30)';
      for(let i=0;i<3;i++)ctx.fillRect(P(cx-dw/2-14-i*5),P(y+dh*0.35+i*9),9-i*2,2);
    }
  }
}



// ═══════════════════════════════════════
//  GAME MANAGER
// ═══════════════════════════════════════
const game={
  state:'TITLE',
  frame:0,score:0,fishScore:0,
  bestScore:parseInt(localStorage.getItem(BEST_KEY)||'0'),
  speed:WARMUP_SPD,scrollX:0,
  deathCount:0,
  // DEAD state: use a separate flag + timer instead of frame diff
  deadTimer:0,
  roofs:[],fishes:[],
  cat:null,

  init(){
    this.frame=0;this.score=0;this.fishScore=0;
    this.speed=WARMUP_SPD;this.scrollX=0;
    this.deadTimer=0;
    this.roofs=[];this.fishes=[];
    this.cat=new Cat();
    // warmup roof
    const wr=new Roof(-20,WARMUP_W+80,110,'flat',ROOF_PALS[0],true);
    this.roofs.push(wr);
    this.cat.y=GY-wr.bh-CAT_H;
    // pre-spawn ahead
    let rx=WARMUP_W+60;
    for(let i=0;i<7;i++)rx=this._spawn(rx);
  },

  _spawn(afterWorldX){
    const gap=P(28+Math.random()*56);
    const w=P(88+Math.random()*112);
    const bh=P(78+Math.random()*112);
    const shape=ALL_SHAPES[Math.floor(Math.random()*ALL_SHAPES.length)];
    const pal=ROOF_PALS[Math.floor(Math.random()*ROOF_PALS.length)];
    const r=new Roof(afterWorldX+gap,w,bh,shape,pal);
    this.roofs.push(r);
    // fish: aligned row above roof, evenly spaced
    // Skip fish randomly on ~30% of roofs to avoid clutter
    if(Math.random()<0.7){
      const nf=1+Math.floor(Math.random()*3); // 1-3 fish
      // Decide pattern: 'row' (parallel to roof, low above), 'arc' (jump arc cue)
      const pattern=Math.random()<0.55?'row':'arc';
      const baseY=r.wallTopY-(28+Math.random()*16); // ~28-44px above roof
      const margin=24;
      const usableW=r.w-margin*2;
      for(let i=0;i<nf;i++){
        const t=nf===1?0.5:i/(nf-1);
        const fx=r.worldX+margin+t*usableW;
        let fy;
        if(pattern==='row'){
          fy=baseY; // straight horizontal row
        }else{
          // arc: rises in middle to suggest jump trajectory
          const arc=Math.sin(t*Math.PI)*30; // 0 at edges, ~30 at middle
          fy=baseY-arc;
        }
        this.fishes.push(new Fish(fx,fy));
      }
    }
    return r.worldX+r.w;
  },

  start(){
    Sound.init();
    this.init();
    this.state='WARMUP';
  },
  restart(){
    this.deathCount++;
    this.init();
    this.state='WARMUP';
  },

  update(){
    this.frame++;

    // dead timer
    if(this.state==='DEAD'){this.deadTimer++;return;}

    // title: nothing to update
    if(this.state==='TITLE')return;

    const cat=this.cat;
    if(!cat)return;

    // scroll
    if(this.state==='WARMUP'){
      this.scrollX+=WARMUP_SPD;
      if(this.scrollX>=WARMUP_W*0.52)this.state='PLAYING';
    }else{
      this.speed=BASE_SPD+this.frame*0.0009;
      this.scrollX+=this.speed;
    }

    // ensure roofs ahead
    while(this.roofs.length>0){
      const lr=this.roofs[this.roofs.length-1];
      if(lr.worldX-this.scrollX<W+400)this._spawn(lr.worldX+lr.w);
      else break;
    }
    // cull roofs and fish
    this.roofs=this.roofs.filter(r=>r.worldX-this.scrollX+r.w>-100);
    this.fishes=this.fishes.filter(f=>f.wx-this.scrollX>-60&&f.alive);

    // cat physics
    cat.update();

    // ── COLLISION ──────────────────────────────────────────────
    // Use "previous foot" position to detect tunneling
    // foot = bottom of cat hitbox
    const foot=cat.y+CAT_H;
    const catWorldX=this.scrollX+CAT_SCR_X; // world X of cat center

    let landed=false;
    for(const r of this.roofs){
      // horizontal overlap check (world coords)
      if(catWorldX+CAT_W/2<r.worldX||catWorldX-CAT_W/2>r.worldX+r.w)continue;

      const sy=r.surfAt(catWorldX,this.scrollX);

      // Landing: cat falling (vy>0), foot crosses surface this frame
      // Use a generous window: from sy-1 to sy + max possible fall per frame
      if(!cat.onGround&&cat.launchT===0&&cat.vy>=0){
        if(foot>=sy-2&&foot<=sy+Math.max(cat.vy+4,18)){
          cat.y=sy-CAT_H;
          cat.vy=0;
          cat.onGround=true;
          cat.squashT=9;
          Sound.land();
          landed=true;
          break;
        }
      }
      // Staying on ground: keep cat snapped to surface
      if(cat.onGround){
        if(foot>=sy-8&&foot<=sy+8){
          cat.y=sy-CAT_H;
          landed=true;
        }
      }
    }
    // fell off all roofs
    if(cat.onGround&&!landed){
      cat.onGround=false;
      cat.vy=0.1; // start falling
    }

    // fish
    for(const f of this.fishes){
      f.update(this.frame);
      if(f.collected)continue;
      const fx=f.screenX(this.scrollX);
      const fy=f.screenY(this.frame);
      if(Math.abs(fx-CAT_SCR_X)<22&&Math.abs(fy-(cat.y+CAT_H/2))<22){
        f.collected=true;
        this.fishScore+=10;
        Sound.fish();
      }
    }

    // score
    if(this.state==='PLAYING'){
      this.score=Math.floor(this.frame/6)+this.fishScore;
      if(this.score>this.bestScore){
        this.bestScore=this.score;
        localStorage.setItem(BEST_KEY,String(this.bestScore));
      }
    }

    // death check
    if(cat.y>H+100){
      cat.dead=true;
      this.state='DEAD';
      this.deadTimer=0;
    }
  },

  draw(){
    ctx.clearRect(0,0,W,H);
    BG.draw(this.frame);
    for(const r of this.roofs)r.draw(this.scrollX);
    for(const f of this.fishes)f.draw(this.scrollX,this.frame);
    if(this.state!=='TITLE'&&this.cat)this.cat.draw(this.deathCount,this.frame);
    this._hud();
  },

  _hud(){
    if(this.state==='TITLE'){
      ctx.fillStyle='rgba(0,0,10,0.75)';ctx.fillRect(0,0,W,H);
      txt('YANE  NEKO',W/2,H/2-40,22,'#ffd040','center');
      txt('屋根ネコ',W/2,H/2-10,14,'#ffffff','center');
      txt('© 2026 Chuckkoba. All rights reserved.',W/2,H/2+14,7,'#556688','center');
      if(Math.floor(this.frame/20)%2===0)
        txt('SPACE  /  TAP  TO  START',W/2,H-44,8,'#aaaacc','center');
      return;
    }
    if(this.state==='DEAD'){
      ctx.fillStyle='rgba(80,0,0,0.55)';ctx.fillRect(0,0,W,H);
      txt('GAME  OVER',W/2,H/2-26,20,'#ff4444','center');
      txt(`SCORE   ${this.score}`,W/2,H/2+10,12,'#ffffff','center');
      txt(`FISH    ${this.fishScore/10}`,W/2,H/2+32,10,'#ffd040','center');
      if(this.deadTimer>60&&Math.floor(this.frame/20)%2===0)
        txt('SPACE  /  TAP  TO  RETRY',W/2,H-50,8,'#aaaacc','center');
      return;
    }
    // in-game
    txt(String(this.score).padStart(6,'0'),12,26,12,'#ffcf6e');
    ctx.font='13px serif';ctx.fillText('🐟',162,26);
    txt(`×${this.fishScore/10}`,182,26,10,'#80ffff');
    txt(`BEST ${String(this.bestScore).padStart(6,'0')}`,W-12,26,9,'#6688aa','right');
    // speed bars
    const bars=Math.min(7,Math.floor(this.speed));
    ctx.fillStyle='rgba(255,200,80,0.25)';
    for(let i=0;i<bars;i++)ctx.fillRect(12+i*8,H-16,6,8);
    if(this.deathCount>=9)txt('👼 ANGEL CAT',W/2,H-12,8,'rgba(255,240,120,0.65)','center');
    if(this.state==='WARMUP'&&Math.floor(this.frame/15)%2===0)
      txt('READY ?',W/2,H/2-16,14,'#ffffff','center');
  }
};

// ═══════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════
const onAction=()=>{
  Sound.init();
  if(game.state==='TITLE'){game.start();return;}
  if(game.state==='DEAD'){
    // use deadTimer (independent of frame counter)
    if(game.deadTimer>60){game.restart();}
    return;
  }
  if(game.state==='WARMUP'||game.state==='PLAYING'){
    game.cat.jump();
  }
};
window.addEventListener('keydown',e=>{
  // ignore modifier-only keys (Shift, Ctrl, Alt, Meta) and dev shortcuts
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(['Shift','Control','Alt','Meta','Tab','Escape','F5','F11','F12'].includes(e.key))return;
  if(e.repeat)return;
  e.preventDefault();
  onAction();
});
window.addEventListener('keyup',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(['Shift','Control','Alt','Meta','Tab','Escape'].includes(e.key))return;
  if(game.cat&&game.cat.releaseJump)game.cat.releaseJump();
});
canvas.addEventListener('pointerdown',e=>{e.preventDefault();onAction();});
canvas.addEventListener('pointerup',e=>{
  e.preventDefault();
  if(game.cat&&game.cat.releaseJump)game.cat.releaseJump();
});
canvas.addEventListener('pointercancel',e=>{
  if(game.cat&&game.cat.releaseJump)game.cat.releaseJump();
});

// ═══════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════
const loop=()=>{
  if(game.state==='TITLE') game.frame++;
  else game.update();
  game.draw();
  requestAnimationFrame(loop);
};
game.state='TITLE';
loop();
</script>
